<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>משחק ניחוש מספרים</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <h1>משחק ניחוש מספרים</h1>
        <p>נא לנחש מספר בין 1-300</p>
        <div class="input-area">
            <input type="number" id="guessInput" placeholder="?" min="1" max="300">
            <button id="guessBtn">נחש</button>
        </div>
        <p id="message" class="message"></p>
        <div class="stats">
            <p>מספר ניסיונות שנותרו: <span id="attemptsLeft">10</span></p>
        </div>
        <button id="restartBtn" class="hidden">שחק שוב</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
