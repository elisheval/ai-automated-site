<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>משחק הניחושים המתוק</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <h1>🍭 נחשי את המספר! 🍭</h1>
        <p>בחרתי מספר בין 1 ל-100. יש לך 5 ניסיונות!</p>
        
        <div class="input-area">
            <input type="number" id="guessInput" placeholder="?" min="1" max="100">
            <button id="guessBtn">נחשי!</button>
        </div>

        <p id="message" class="message">בהצלחה! ✨</p>
        
        <div class="stats">
            <p>ניסיונות שנשארו: <span id="attemptsLeft">5</span></p>
        </div>

        <button id="restartBtn" class="hidden">משחק חדש 🔄</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
