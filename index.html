<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>משחק ניחוש מספרים</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <h1>משחק הניחושים</h1>
        <p>נחשו מספר בין 1 ל-200</p>
        <div class="input-area">
            <input type="number" id="guessInput" placeholder="?" min="1" max="200">
            <button id="guessBtn">ניחוש</button>
        </div>
        <p id="message" class="message"></p>
        <div class="stats">
            <p>ניסיונות נותרו: <span id="attemptsLeft">5</span></p>
        </div>
        <button id="restartBtn" class="hidden">התחל מחדש</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
